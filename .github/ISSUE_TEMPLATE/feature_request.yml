name: Feature request
description: Suggest a new command, agent, flavor, or capability.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the situation, not just the proposed solution. Concrete
        examples make this much easier to act on.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: |
        How would you like `pod` (or the dashboard, or the docs) to behave?
        Sketch a CLI, a flag, or a flow if you have one in mind.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - CLI (`pod`)
        - Lib module (`.pod_agents_config/lib/`)
        - New agent plugin
        - New flavor / volume bundle
        - Dashboard (Go server)
        - Docs / GitHub Pages
        - Tests / CI
        - Other
