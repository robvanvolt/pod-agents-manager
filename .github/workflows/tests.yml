name: tests

# Lint + sham tests for the pod-agents-manager bash entrypoint and lib modules.
# This workflow does NOT touch GitHub Pages — no deploy-pages action, no
# gh-pages branch writes — so it cannot retrigger Pages builds.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Opt JavaScript-based actions (actions/checkout, etc.) into the Node.js 24
# runtime ahead of GitHub's June 2026 default switch. Removes the
# "Node.js 20 actions are deprecated" warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run test suite
        run: bash tests/run.sh
