  </text>
  <g transform="translate(90 445)" fill="none" stroke="#94a3b8" stroke-opacity=".35">
    <rect width="162" height="46" rx="23"/>
    <rect x="182" width="116" height="46" rx="23"/>
    <rect x="318" width="142" height="46" rx="23"/>
    <rect x="480" width="178" height="46" rx="23"/>
  </g>
  <g fill="#d9f7ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">
    <text x="116" y="475">Apache 2.0</text>
    <text x="216" y="475">Bash</text>
    <text x="350" y="475">Podman</text>
    <text x="514" y="475">Go dashboard</text>
