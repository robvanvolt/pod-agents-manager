<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pod Dashboard</title>
  <link rel="icon" href="./logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><img src="./logo.svg" alt=""></span>
        <div class="title-stack">
          <h1>Pod Dashboard</h1>
          <span class="tagline">rootless AI agent fleets</span>
        </div>
      </div>
      <div class="chips" id="topbar-chips" aria-live="polite">
        <span class="chip version" id="chip-version" hidden><span class="label">version</span><code id="chip-version-val">–</code></span>
        <span class="chip" id="chip-host" hidden><span class="label">host</span><code id="chip-host-val">–</code></span>
        <span class="chip" id="chip-ip" hidden><span class="label">ip</span><code id="chip-ip-val">–</code></span>
        <span class="chip" id="chip-time"><span class="label">time</span><code id="chip-time-val">…</code></span>
      </div>
    </div>
  <div id="toast" class="toast"></div>

  <div class="card">
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>CPU %</th><th>MEM Usage</th><th>MEM %</th>
        <th>NET I/O</th><th>BLOCK I/O</th><th>PIDS</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="stats-body">
      <tr><td colspan="9">Loading stats…</td></tr>
    </tbody>
  </table>
  </div>

  <div class="card">
    <h2>Create new pod</h2>
    <form id="create-form" onsubmit="return submitCreate(event)">
      <div class="grid">
        <div><label>Agent</label><select name="agent" id="f-agent" required></select></div>
        <div><label>Instance <span style="opacity:.6">(blank = auto)</span></label><input name="instance" id="f-instance" placeholder="dev, alpha, …"></div>
        <div><label>Flavor</label><select name="flavor" id="f-flavor"></select></div>
        <div><label>Volumes</label><select name="volumes" id="f-volumes"></select></div>
        <div><label>Base image</label><select name="base" id="f-base"></select></div>
      </div>
      <div class="actions-row">
        <button type="submit" class="primary" id="f-submit">Start pod</button>
        <span id="f-status" style="font-size: 12px; opacity:.8;"></span>
      </div>
      <pre class="out" id="f-out"></pre>
    </form>
  </div>
  </div>

  <script>
    const fmtBytes = (raw) => {
      const n = Number(raw);
      if (!isFinite(n) || raw === undefined || raw === null) return String(raw ?? '-');
      const u = ['B','kB','MB','GB','TB']; let i = 0; let v = n;
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
      return i === 0 ? `${Math.round(v)}${u[i]}` : `${v.toFixed(v >= 100 ? 1 : 2)}${u[i]}`;
    };
    const parsePct = (raw) => {
      if (raw == null || raw === '-' || raw === '') return null;
      const n = parseFloat(String(raw).replace('%', ''));
      return isFinite(n) ? n : null;
    };
    const fmtPct = (raw) => {
      const n = parsePct(raw);
      return n == null ? '-' : `${n.toFixed(2)}%`;
    };
    const heatColor = (pct) => {
      const p = Math.max(0, Math.min(pct, 100));
      let r, g, b;
      if (p <= 25) { const t = p / 25; r = 34 + (234 - 34) * t; g = 197 + (179 - 197) * t; b = 94 + (8 - 94) * t; }
      else { const t = (p - 25) / 75; r = 234 + (220 - 234) * t; g = 179 + (38 - 179) * t; b = 8 + (38 - 8) * t; }
      return `rgba(${r|0},${g|0},${b|0},0.22)`;
    };
    const heatCell = (pct, label) => {
      if (pct == null) return `<span>${label}</span>`;
      return `<div class="heat-wrap"><div class="heat-fill" style="width:${Math.max(0,Math.min(pct,100)).toFixed(2)}%; background:${heatColor(pct)};"></div><span class="heat-text">${label}</span></div>`;
    };
    const memUsage = (c) => {
      if (c.MemUsageBytes != null) return `${fmtBytes(c.MemUsageBytes)} / ${fmtBytes(c.MemLimit)}`;
      const raw = c.MemUsage;
      if (!raw) return '-';
      return String(raw);
    };
    const ioPair = (c, ins, outs, fallback) => {
      const i = ins.find(k => c[k] != null);
      const o = outs.find(k => c[k] != null);
      if (i || o) return `${i ? fmtBytes(c[i]) : '-'} / ${o ? fmtBytes(c[o]) : '-'}`;
      return c[fallback] || '-';
    };

    function setChip(id, value) {
      const chip = document.getElementById(id);
      const val = document.getElementById(`${id}-val`);
      if (!chip || !val) return;
      if (value == null || value === '') { chip.hidden = true; return; }
      val.textContent = value;
      chip.hidden = false;
    }

    async function fetchInfo() {
      try {
        const res = await fetch('/api/info');
        const data = await res.json();
        setChip('chip-version', data.version || null);
        setChip('chip-host', data.hostname || null);
        setChip('chip-ip', (data.ips || [])[0] || null);
      } catch (_) {}
    }

    function updateClock() {
      const val = document.getElementById('chip-time-val');
      if (val) val.textContent = new Date().toLocaleTimeString();
    }

    async function fetchStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        renderTable(data);
      } catch (err) {
        console.error('stats fetch failed:', err);
      }
    }

    function renderTable(containers) {
      const tbody = document.getElementById('stats-body');
      if (!containers || containers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9">No containers running</td></tr>';
        return;
      }
      const html = containers.map(c => {
        const name = c.Name || '-';
        const dash = name.indexOf('-');
        const agent = dash > 0 ? name.slice(0, dash) : '';
        const instance = dash > 0 ? name.slice(dash + 1) : '';
        const cpu = parsePct(c.CPU || c.CPUPerc);
        const mem = parsePct(c.MemPerc);
        const id = (c.ID || c.ContainerID || '').slice(0, 12);
        const actions = (agent && instance) ? `
          <div class="inline">
            <button onclick="sendAction('restart','${agent}','${instance}')">restart</button>
            <button onclick="sendAction('stop','${agent}','${instance}')">stop</button>
            <button onclick="sendAction('start','${agent}','${instance}')">start</button>
            <button class="danger" onclick="confirmDelete('${agent}','${instance}')">delete</button>
          </div>` : '';
        return `<tr>
          <td><code>${id}</code></td>
          <td><b>${name}</b></td>
          <td>${heatCell(cpu, fmtPct(c.CPU || c.CPUPerc))}</td>
          <td>${memUsage(c)}</td>
          <td>${heatCell(mem, fmtPct(c.MemPerc))}</td>
          <td>${ioPair(c, ['NetInput','NetworkInput'], ['NetOutput','NetworkOutput'], 'NetIO')}</td>
          <td>${ioPair(c, ['BlockInput'], ['BlockOutput'], 'BlockIO')}</td>
          <td>${c.PIDS || c.Pids || c.PIDs || '-'}</td>
          <td>${actions}</td>
        </tr>`;
      }).join('');
      tbody.innerHTML = html;
    }

    function confirmDelete(agent, instance) {
      if (confirm(`Delete ${agent}-${instance}? This wipes its workspace.`)) sendAction('delete', agent, instance);
    }

    async function sendAction(op, agent, instance) {
      const formData = new URLSearchParams();
      formData.append('op', op);
      formData.append('agent', agent);
      formData.append('instance', instance);
      try {
        const res = await fetch('/api/action', { method: 'POST', body: formData });
        const text = await res.text();
        showToast(res.ok ? `${op} ${agent} ${instance}` : text, !res.ok);
        fetchStats();
      } catch (err) {
        showToast('Network error: ' + err, true);
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (isError ? 'err' : 'ok');
      t.style.display = 'block';
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.style.display = 'none', 4000);
    }

    function fillSelect(id, values, selected) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      for (const v of values) {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (v === selected) opt.selected = true;
        el.appendChild(opt);
      }
    }

    async function loadAgentOptions() {
      try {
        const res = await fetch('/api/agents');
        const data = await res.json();
        fillSelect('f-agent', data.agents || []);
        fillSelect('f-flavor', data.flavors || ['all'], 'all');
        fillSelect('f-volumes', data.volumes || ['all', 'none'], 'all');
        fillSelect('f-base', data.bases || ['alpine', 'trixie-slim'], data.defaultBase || 'alpine');
      } catch (err) {
        console.error('failed to load agent options:', err);
      }
    }

    async function submitCreate(ev) {
      ev.preventDefault();
      const form = document.getElementById('create-form');
      const submit = document.getElementById('f-submit');
      const statusEl = document.getElementById('f-status');
      const outEl = document.getElementById('f-out');
      const fd = new FormData(form);
      const body = new URLSearchParams();
      for (const [k, v] of fd.entries()) body.append(k, v);

      submit.disabled = true;
      statusEl.textContent = 'starting…';
      outEl.style.display = 'none';
      outEl.textContent = '';

      try {
        const res = await fetch('/api/create', { method: 'POST', body });
        const text = await res.text();
        let data; try { data = JSON.parse(text); } catch (_) { data = { output: text }; }
        if (res.ok) {
          const label = data.instance ? `${data.agent}-${data.instance}` : `${data.agent}-(auto)`;
          statusEl.textContent = `started ${label}`;
          showToast(`Started ${label}`);
          if (data.output) { outEl.textContent = data.output; outEl.style.display = 'block'; }
          form.elements['instance'].value = '';
          fetchStats();
        } else {
          statusEl.textContent = 'failed';
          outEl.textContent = data.output || data.error || text;
          outEl.style.display = 'block';
          showToast('Create failed — see output below', true);
        }
      } catch (err) {
        statusEl.textContent = 'network error';
        showToast('Network error: ' + err, true);
      } finally {
        submit.disabled = false;
      }
      return false;
    }

    fetchInfo();
    fetchStats();
    loadAgentOptions();
    setInterval(fetchStats, 3000);
    setInterval(fetchInfo, 30000);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
